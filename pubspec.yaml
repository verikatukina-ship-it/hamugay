name: hamugay
description: "Registro de Ocorrências: Captura instantânea de ameaças com imagens e localização precisa;"

publish_to: 'none'

version: 1.0.9+11

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  dio: ^5.8.0+1
  get_it: ^8.0.3
  equatable: ^2.0.7
  dartz: ^0.10.1
  bloc: ^9.0.0
  flutter_bloc: ^9.1.0
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  fl_chart: 0.68.0
  google_fonts: ^6.2.1
  intl: any
  scrollable_positioned_list: ^0.3.8
  flutter_staggered_grid_view: ^0.7.0
  flutter_map: 7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.4
  image_picker: ^1.1.2
  audio_waveforms: ^1.3.0
  internet_connection_checker: ^3.0.1
  go_router: ^14.8.1
  firebase_core: ^3.13.0
  firebase_crashlytics: ^4.3.5
  firebase_analytics: ^11.4.5
  csv: ^6.0.0
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_gen: ^5.10.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/map_icons/

